title: Azure Key Vault Secret Read via Management Plane
id: 786dd97b-d646-4c83-a089-3d34b99e1fc2
status: experimental
description: >
  Detect explicit reads of secrets out of an Azure Key Vault via the
  management-plane operation
  Microsoft.KeyVault/vaults/secrets/getSecret/action. Application-tier
  secret consumption goes through the data plane and the listKeys path —
  hits on this management-plane verb are unusual outside of break-glass,
  audits, or attacker reconnaissance.
references:
  - https://attack.mitre.org/techniques/T1555/006/
  - https://attack.mitre.org/techniques/T1552/004/
author: Maximus Fisher
date: 2026-05-12
tags:
  - attack.credential-access
  - attack.t1555.006
  - attack.t1552.004
logsource:
  product: azure
  service: activitylogs
detection:
  selection:
    OperationNameValue: 'Microsoft.KeyVault/vaults/secrets/getSecret/action'
  condition: selection
falsepositives:
  - Documented audit traversal of a Key Vault inventory.
  - Disaster-recovery rehearsals that walk the secret list under a
    privileged role.
level: medium
